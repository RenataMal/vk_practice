name: Quality checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Check bundle size
        shell: bash
        run: |
          size_bytes=$(du -sb dist | cut -f1)
          limit_bytes=$((10 * 1024 * 1024))

          echo "Build size: $size_bytes bytes"
          echo "Maximum allowed size: $limit_bytes bytes"

          if [ "$size_bytes" -gt "$limit_bytes" ]; then
            echo "Build exceeds the 10 MB limit."
            exit 1
          fi